<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 완료</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa; /* 밝은 회색 배경 */
        }

        .complete-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .complete-container h1 {
            font-size: 2rem;
            color: #007bff; /* 부트스트랩 기본 파란색 */
        }

        .complete-container p {
            font-size: 1rem;
            color: #6c757d; /* 회색 텍스트 */
            margin: 20px 0;
        }

        .complete-container a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="complete-container">
        <h1>회원가입 완료!</h1>
        <p>회원가입이 성공적으로 완료되었습니다.<br>환영합니다!</p>
        <a href="login.html" class="btn btn-primary btn-lg">로그인하기</a>
    </div>
</body>
</html>
